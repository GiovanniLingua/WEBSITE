<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA09 Trading | Hardware & Construction Store | Witbank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e40af;
            --accent: #10b981;
            --dark: #0f172a;
            --light: #f8fafc;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--light);
            color: #1e293b;
            line-height: 1.7;
        }
        header {
            background: linear-gradient(rgba(30,64,175,0.8), rgba(30,64,175,0.85)),
                        url('hero-banner.jpg') center/cover no-repeat fixed;
            color: white;
            text-align: center;
            padding: 180px 20px 120px;
        }
        .logo {
            width: 200px;
            background: white;
            border-radius: 50%;
            padding: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }
        header h1 { font-size: 4rem; font-weight: 800; margin-bottom: 12px; }
        .tagline { font-size: 1.8rem; margin-bottom: 20px; font-weight: 500; }
        .address-info { font-size: 1.35rem; opacity: 0.95; }

        nav {
            background: var(--dark);
            padding: 1.3rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 3rem;
            flex-wrap: wrap;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        nav a:hover { color: var(--accent); }

        section { 
            padding: 100px 20px; 
            max-width: 1300px; 
            margin: 0 auto; 
            opacity: 0; 
            transform: translateY(40px); 
            transition: all 1s ease-out; 
        }
        section.visible { opacity: 1; transform: translateY(0); }

        h2 {
            color: var(--primary);
            font-size: 3rem;
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }
        h2::after {
            content: '';
            width: 130px;
            height: 6px;
            background: var(--accent);
            display: block;
            margin: 20px auto 0;
            border-radius: 3px;
        }
        .section-header-img {
            width: 100%;
            max-height: 420px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 3rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .slideshow-container {
            position: relative;
            max-width: 100%;
            margin: 3rem auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }
        .slideshow-slide {
            display: none;
            width: 100%;
            transition: opacity 1.2s ease-in-out;
        }
        .slideshow-slide.active { display: block; opacity: 1; }
        .slideshow-slide img {
            width: 100%;
            height: 520px;
            object-fit: cover;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 3rem;
        }
        .service-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            transition: all 0.4s ease;
        }
        .service-card:hover {
            transform: translateY(-20px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.22);
        }
        .card-content { padding: 3rem; }
        .card-content h3 { color: var(--primary); font-size: 2.3rem; margin-bottom: 1.8rem; }

        ul { list-style: none; }
        ul li {
            margin: 16px 0;
            padding-left: 38px;
            position: relative;
            font-size: 1.2rem;
        }
        ul li::before {
            content: '\f058';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            color: var(--accent);
            position: absolute;
            left: 0;
            top: 4px;
        }
        .contact-section {
            background: linear-gradient(135deg, var(--primary), var(--dark));
            color: white;
            text-align: center;
            padding: 130px 20px;
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 3.5rem;
            margin: 3.5rem 0;
        }
        .social-icon {
            color: white;
            font-size: 3.8rem;
            transition: all 0.4s;
        }
        .social-icon:hover {
            color: var(--accent);
            transform: scale(1.3) rotate(10deg);
        }
        .whatsapp-float {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 85px;
            height: 85px;
            background: #10b981;
            color: white;
            border-radius: 50%;
            font-size: 3.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 16px 40px rgba(16,185,129,0.45);
            z-index: 9999;
        }
        .whatsapp-float:hover { transform: scale(1.18); }
        footer {
            background: var(--dark);
            color: #94a3b8;
            text-align: center;
            padding: 4rem 1rem;
        }
        .footer-credit { margin-top: 1.5rem; opacity: 0.8; }
        @media (max-width: 768px) {
            header { padding: 120px 15px 60px; }
            header h1 { font-size: 2.9rem; }
            nav ul { flex-direction: column; gap: 1.5rem; }
            .slideshow-slide img { height: 340px; }
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="DNA09 Trading Logo" class="logo">
    <h1>DNA09 Trading</h1>
    <p class="tagline">Build with Confidence • Build with DNA Trading</p>
    <p class="address-info">
        Shop 7A, Del Judor Centre • C/O Steenkamp & Entie Street • Witbank, Mpumalanga
    </p>
</header>

<nav>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#store">Our Store</a></li>
        <li><a href="#products">Products</a></li>
        <li><a href="#gas">Gas Refills</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<section id="home">
    <h2>Welcome to DNA
