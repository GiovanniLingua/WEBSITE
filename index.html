<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Operations - Used Oil Collectors</title>
    <meta name="description" content="Rose Foundation Approved Used Oil Collection, Recycling & Re-refining in South Africa.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --red: #c8102e;
            --dark: #111111;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Arial', sans-serif; line-height: 1.6; color: #333; }

        header { background: var(--dark); color: white; padding: 12px 0; position: sticky; top: 0; z-index: 100; }
        .top-bar { background: #222; padding: 8px 0; font-size: 0.9rem; }
        .logo img { height: 75px; width: auto; }

        .hero {
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('assets/images/hero-oil-truck.jpg') center/cover no-repeat;
            height: 85vh;
            display: flex;
            align-items: center;
            color: white;
            text-align: center;
        }

        .section { padding: 90px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 220px; object-fit: cover; }

        /* Form Styling */
        .contact-form {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        .btn-whatsapp {
            background: #25D366;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .btn-whatsapp:hover { background: #1eb355; }

        /* WhatsApp Floating Button */
        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25D366;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            text-decoration: none;
        }
        .whatsapp-float:hover { transform: scale(1.1); }
    </style>
</head>
<body>

    <!-- Top Bar + Header (same as before) -->
    <div class="top-bar">
        <div style="max-width:1280px; margin:auto; display:flex; justify-content:space-between; padding:0 20px;">
            <div>Rose Foundation Approved • Compliant Company</div>
            <div>Call: <strong>065 800 3371</strong></div>
        </div>
    </div>

    <header>
        <div style="max-width:1280px; margin:auto; padding:0 20px; display:flex; align-items:center; justify-content:space-between;">
            <div class="logo">
                <img src="assets/images/logo-apex.png" alt="Apex Operations Logo">
            </div>
            <nav style="font-weight:600;">
                <a href="#" style="color:white; margin:0 18px; text-decoration:none;">Home</a>
                <a href="#services" style="color:white; margin:0 18px; text-decoration:none;">Services</a>
                <a href="#collect" style="color:white; margin:0 18px; text-decoration:none;">What We Collect</a>
                <a href="#contact" style="color:white; margin:0 18px; text-decoration:none;">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Hero (same) -->
    <section class="hero">
        <div style="max-width:1280px; margin:auto; padding:0 20px;" class="hero-content">
            <img src="assets/images/rose-foundation-seal.png" alt="Rose Foundation" style="height:120px; margin-bottom:20px;">
            <h1>USED OIL COLLECTORS</h1>
            <p class="subtitle">COLLECT • RECYCLE • PROTECT</p>
            <a href="#contact" style="background:var(--red); color:white; padding:18px 45px; font-size:1.3rem; text-decoration:none; border-radius:4px; display:inline-block; margin-top:20px;">
                REQUEST COLLECTION
            </a>
        </div>
    </section>

    <!-- Services & Collect sections (same as previous) -->
    <!-- ... (keeping them short for brevity) ... -->

    <!-- GET IN CONTACT FORM -->
    <section class="section" id="contact" style="background:#f9f9f9;">
        <div style="max-width:1280px; margin:auto; padding:0 20px; text-align:center;">
            <h2 style="font-size:2.8rem; margin-bottom:20px;">Get In Contact</h2>
            <p style="font-size:1.3rem; margin-bottom:40px;">Fill in your details and send us a message on WhatsApp</p>

            <div class="contact-form">
                <form id="oilForm">
                    <div class="form-group">
                        <label>Client Name</label>
                        <input type="text" id="name" placeholder="Your Full Name" required>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="e.g. Pretoria, Johannesburg, Durban" required>
                    </div>
                    <div class="form-group">
                        <label>Liters of Oil You Want to Sell</label>
                        <input type="number" id="liters" placeholder="e.g. 500" required>
                    </div>

                    <button type="submit" class="btn-whatsapp">
                        <i class="fab fa-whatsapp"></i> Send via WhatsApp
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div style="max-width:1280px; margin:auto; padding:0 20px; text-align:center;">
            <p>© 2026 Apex Operations (Pty) Ltd • All Rights Reserved</p>
        </div>
    </footer>

    <!-- WhatsApp Floating Button -->
    <a href="https://wa.me/27658003371?text=Good%20day%2C%20I%20would%20like%20to%20sell%20oil." 
       class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        document.getElementById('oilForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const location = document.getElementById('location').value.trim();
            const liters = document.getElementById('liters').value.trim();

            if (!name || !location || !liters) {
                alert("Please fill in all fields.");
                return;
            }

            const message = `Good day,%0A%0AI am from ${encodeURIComponent(location)}.%0AI have ${encodeURIComponent(liters)} liters of oil that I want to sell.%0A%0AKind regards%0A${encodeURIComponent(name)}`;

            const whatsappURL = `https://wa.me/27658003371?text=${message}`;
            window.open(whatsappURL, '_blank');
        });
    </script>
</body>
</html>
